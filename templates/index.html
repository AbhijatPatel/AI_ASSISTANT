<!DOCTYPE html>
<html>
<head>
    <title>AI Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>🤖 AI Assistant</h1>

    <form method="POST">
        <input type="text" name="question" placeholder="Ask me anything..." required>
        <button type="submit">Send</button>
    </form>

    {% if answer %}
    <div class="answer">
        <b>AI:</b><br>
        {{ answer }}
    </div>
    {% endif %}

</div>

</body>
</html>
